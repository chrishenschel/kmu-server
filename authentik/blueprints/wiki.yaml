version: 1
metadata:
  name: __DOMAIN__ Wiki.js
  labels:
    type: custom
entries:
  # Proxy provider (for Caddy forward_auth / outpost)
  - model: authentik_providers_proxy.proxyprovider
    id: wiki-provider
    identifiers:
      name: Wiki Proxy
    attrs:
      mode: forward_single
      external_host: https://wiki.__DOMAIN__
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
    state: present

  - model: authentik_core.application
    id: wiki-app
    identifiers:
      slug: wiki
    attrs:
      name: Wiki
      slug: wiki
      provider: !KeyOf wiki-provider
      policy_engine_mode: any
    state: present

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf wiki-app
      order: 0
    attrs:
      group: !Find [authentik_core.group, [name, "authentik Admins"]]
    state: present

  # OAuth2/OIDC provider for Wiki.js (https://integrations.goauthentik.io/documentation/wiki-js/)
  - model: authentik_providers_oauth2.oauth2provider
    id: wiki-oidc-provider
    identifiers:
      name: Wiki OIDC
    attrs:
      client_id: __WIKI_CLIENT_ID__
      client_secret: __WIKI_CLIENT_SECRET__
      redirect_uris:
        - matching_mode: strict
          url: https://wiki.__DOMAIN__/login/authentik/callback
      token_validity: hours=1
      sub_mode: user_uuid
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "app_admin"]]
    state: present

  - model: authentik_core.application
    id: wiki-oidc-app
    identifiers:
      slug: wiki-oidc
    attrs:
      name: Wiki (OIDC)
      slug: wiki-oidc
      provider: !KeyOf wiki-oidc-provider
      policy_engine_mode: any
      launch_url: https://wiki.__DOMAIN__/
    state: present

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf wiki-oidc-app
      order: 0
    attrs:
      group: !Find [authentik_core.group, [name, "authentik Admins"]]
    state: present
