version: 1
metadata:
  name: __DOMAIN__ Paperless-ngx
  labels:
    type: custom
entries:
  # 1. Proxy provider (for Caddy forward_auth / outpost)
  - model: authentik_providers_proxy.proxyprovider
    id: paperless-provider
    identifiers:
      name: Paperless Proxy
    attrs:
      mode: forward_single
      external_host: https://paperless.__DOMAIN__
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
    state: present

  - model: authentik_core.application
    id: paperless-app
    identifiers:
      slug: paperless
    attrs:
      name: Paperless
      slug: paperless
      provider: !KeyOf paperless-provider
      policy_engine_mode: any
    state: present

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf paperless-app
      order: 0
    attrs:
      group: !Find [authentik_core.group, [name, "authentik Admins"]]
    state: present

  # 2. OAuth2/OIDC provider for Paperless-ngx "Login with authentik" (per https://integrations.goauthentik.io/documentation/paperless-ngx/)
  - model: authentik_providers_oauth2.oauth2provider
    id: paperless-oidc-provider
    identifiers:
      name: Paperless OIDC
    attrs:
      client_id: __PAPERLESS_CLIENT_ID__
      client_secret: __PAPERLESS_CLIENT_SECRET__
      redirect_uris:
        - matching_mode: strict
          url: https://paperless.__DOMAIN__/accounts/oidc/authentik/login/callback/
      token_validity: hours=1
      sub_mode: user_uuid
      signing_key: !Find [authentik_crypto.certificatekeypair, [name, "authentik Self-signed Certificate"]]
      authorization_flow: !Find [authentik_flows.flow, [slug, "default-provider-authorization-implicit-consent"]]
      invalidation_flow: !Find [authentik_flows.flow, [slug, "default-provider-invalidation-flow"]]
      property_mappings:
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "openid"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "email"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "profile"]]
        - !Find [authentik_providers_oauth2.scopemapping, [scope_name, "app_admin"]]
    state: present

  - model: authentik_core.application
    id: paperless-oidc-app
    identifiers:
      slug: paperless-oidc
    attrs:
      name: Paperless (OIDC)
      slug: paperless-oidc
      provider: !KeyOf paperless-oidc-provider
      policy_engine_mode: any
      launch_url: https://paperless.__DOMAIN__/
    state: present

  - model: authentik_policies.policybinding
    identifiers:
      target: !KeyOf paperless-oidc-app
      order: 0
    attrs:
      group: !Find [authentik_core.group, [name, "authentik Admins"]]
    state: present
